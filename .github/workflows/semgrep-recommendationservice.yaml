# ── semgrep-recommendationservice.yml ───────────────────────────
name: Semgrep — recommendationservice
 
on:
  push:
    branches: ["main"]
    paths:
      - "src/recommendationservice/**"
  pull_request:
    branches: ["main"]
    paths:
      - "src/recommendationservice/**"
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 6am UTC
  workflow_dispatch:
 
jobs:
  semgrep-recommendationservice:
    name: Scan recommendationservice
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep — recommendationservice
        run: semgrep ci --subdir src/recommendationservice
